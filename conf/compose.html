<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="bootstrap.min.css" rel="stylesheet">
    <title>I'm safe</title>
</head>

<body>
<div class="container">
        <h1>I'm safe</h1>

        Compose a short message for delivery via Email or SMS.<br> We recommend <b>both</b>

		
    <div class="form-group">
    <form action="/entry" method="POST" enctype="application/x-www-form-urlencoded">

        <div class="form-control">
			<span>
            <label>Your name: </label>
            <input class="form-content" type="text" id="name" name="name" placeholder="(required)" required>
			</span>
        </div>
		
		<div class="form-control">
			<span>
            <label>Email: </label>
            <input type="email" id="email_address" name="email_address" placeholder="recipient@example.com">
			<span>
			<p>
			<span>
            <label>SMS: </label>
            <input type="tel" id="sms_address" name="sms_address" placeholder="XXX-XXX-XXXX" pattern="\d{3}-\d{3}-\d{4}" title="Format: 123-456-7890">
			<span>
        </div>

        <div class="form-control">
            <label for="message">Message (click to insert predefined text or type your own message in the box)</label>
			<!-- add -->
			<select class="form-content dropdown" id="shortMessage" name="shortMessage" size="1" onchange="handle_select()">
				<option value="0">(none)</option>
				<option value="27">I am safe and well.</option>
				<option value="28">Household safe and well.</option>
				<option value="29">Currently at shelter.</option>
				<option value="30">Currently at home.</option>
				<option value="31">Currently at family/friend's house.</option>
				<option value="32">Currently at a hotel.</option>
				<option value="33">Safe but moving to a safer location.</option>
				<option value="34">Evacuating to a shelter.</option>
				<option value="35">Evacuating to a family member/friend's house.</option>
				<option value="36">Evacuating and safe.</option>
				<option value="37">At home and plan to remain here.</option>
				<option value="38">Will contact you when able.</option>
				<option value="39">All communications are down.</option>
				<option value="40">Share this message with others.</option>
			</select>
			<!-- end add-->
            <p></p><p></p>
<textarea id="message" name="message" rows="5" cols="38" required oninput="updateCharCount();">
</textarea>
            <p></p>
            <div id="charCount" class="text-sm text-sm-end" align="right">0/92</div>
  		</div>

		<div>
			Note that message delivery is <strong>NOT</strong> guaranteed and replies to your device are  <strong>NOT</strong> possible
		</div>
		
		<div class="form-control text-center">
  			<span>
  				<button class="btn btn-primary" type="submit" onclick="return handle_submit();">submit</button>
				<!--
  				<button class="btn btn-secondary" type="reset" onclick="return handle_reset();">Reset</button>
				-->
  			</span>	
		</div>

	</form>
	</div>
</div>	


<script>
	var $message = $id("message");
	var $shortMessage = $id("shortMessage");
	var $name = $id("name");
	var $charCount = $id("charCount");
	
	function $id(id) { 	// getElementById
		return document.getElementById(id);
	}

	function countWords(string) {
		return string.trim().split(/\s+/).length;
	}

	function isValidEmail() {
		var email = $id("email_address").value.trim().toLowerCase();
		return  /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email);		   		   
	}

	function isValidEmail2() {
		var email = $id("email_address").value.trim();
		return String(email)
		  .toLowerCase()
		  .match(
		    /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|.(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/ ); } 
			
	function isValidPhone() { 
		var phone = $id("sms_address").value.trim(); 
		var target = phone.replace(/[^\d]/g,''); // remove all non-digits 
			if(target && target.length===10 &&target.match(/^[2-9]\d{2}/) ) { 
				return true; 
			} return false; 
	}
	
	function isNonAscii() {
		var message = $message.value.trim();
		if (message.length == 0) {
			return false;
		}
		var ascii = /^[ -~\n]+$/;
		if ( !ascii.test( message ) ) {
		  return true;
		}
		return false;
	}
	
	function handle_submit() { 
		var charCount = getCharCount(); 
		var countLimit = 92; 
		if (charCount > countLimit) { 
			alert("Message size(" + charCount + ") bigger than limit(" + countLimit + ")! Shrink message!"); 
			return false; 
		} 
		
		var email_address = $id("email_address").value.trim();
		//alert("email: " + email_address + ", len " + email_address.length)	
		var sms_address = $id("sms_address").value.trim();	
		//alert("sms: " + sms_address + ", len " + sms_address.length);
		
		if (email_address.length == 0 && sms_address.length == 0) {
			alert("neither an Email nor SMS address entered!");
			return false;
		}
				
		if (email_address.length > 0) { 
			if (!isValidEmail() && !isValidEmail2()) { 
				alert("Email adress does not appear to be valid!"); 
				return false;
			}
		}	


	
		if (sms_address.length > 0) {
			if (!isValidPhone()) { 
				alert("SMS address does not appear to be a valid 10 digit cell phone number"); 
				return false; 
			} 
		}
		
		if (isNonAscii()) {
			alert("Non ASCII characters (such as diacritical marks or emojis can't be sent. Please remove!");
			return false;
		}
		
		/*
		var count = countWords(address); 
		if (count != 1) { 
			alert("Address invalid: it should only contain 1 address"); 
				return false; 
			} return true; 
		} 
		*/
		}
		
	function handle_reset() { 
		$charCount.innerHTML="0/92"; 
		return 0; 
	} 
	
	function handle_select() { 
		var value = $shortMessage.value; 
		var text = $shortMessage.options[$shortMessage.selectedIndex].text; 
		$shortMessage.selectedIndex = 0; 
		var msgText = $message.value; 
		var pad = msgText.length == 0 ? "" : " "; 
		$message.value = msgText + pad + text; updateCharCount(); 
	} 
	
	function getCharCount() { 
		return $message.value.trim().length;; 
	} 
	
	function updateCharCount() { 
		var totalLength = getCharCount(); 
		var countLimit = 92; 
		$charCount.innerHTML = totalLength + "/" + countLimit; 
		$charCount.style.color = (totalLength > countLimit) ? "red" : "black"; 
	}

</script>

</body>

</html>
