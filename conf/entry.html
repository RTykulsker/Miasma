<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm safe for <!-- TYPE-DEVICE --></title>
	
<style>
.flex-container > div {
	display: flex;
	flex-direction: column;
	margin: 5px;
	padding: 5px;
	font-size: 20px;
}

form {
  /* Center the form on the page */
  margin: 0 auto;
  width: 500px;
  /* Form outline */
  padding: 1em;
  border: 1px solid #CCC;
  border-radius: 1em;
}

.flex-container > span {
	display: flex;
	flex-direction: row;
	margin: 15px;
	padding: 5px;
	font-size: 20px;
}
</style>
</head>

<body>
<h2>I'm safe compose a message for <!-- TYPE-DEVICE --></h2>
<div>
A simple web site/service to send an "I Am Safe" message via (ham) radio to <!-- TYPE-DEVICE -->
</div>
 <form action="/entry" method="GET" enctype="application/x-www-form-urlencoded">
<div class="flex-container">

  <div>
    <label for="name">Your name</label>
    <input type="text" id="name" name="name" required oninput="handle_name()">
  </div>

  <div>
    <label for="address"><!-- TYPE-LABEL --></label>
    <input type="<!-- TYPE-INPUT -->" id="address" name="address" required oninput="handle_address()">
  </div>
  
  <div>
	<label for="shortMessage">Click to insert short message</label>
	<select id="shortMessage" name="shortMessage" size="1" onchange="handle_select()">
		<option value="0">(none)</option>
		<option value="27">I am safe and well.</option>
		<option value="28">Household safe and well.</option>
		<option value="29">Currently at shelter.</option>
		<option value="30">Currently at home.</option>
		<option value="31">Currently at family/friend’s house.</option>
		<option value="32">Currently at a hotel.</option>
		<option value="33">Safe but moving to a safer location.</option>
		<option value="34">Evacuating to a shelter.</option>
		<option value="35">Evacuating to a family member/friend’s house.</option>
		<option value="36">Evacuating and safe.</option>
		<option value="37">At home and plan to remain here.</option>
		<option value="38">Will contact you when able.</option>
		<option value="39">All communications are down.</option>
		<option value="40">Share this message with others.</option>
	</select>
  </div>
	
  <div>
	<label for="message">Message</label>
<textarea id="message" name="message" rows="5" cols="25" required oninput="handle_message();">
</textarea> 
  </div>
	
  <div id="charCount" class="charCount" font-size=text-sm text-left>0/<!-- TYPE-MAX-CHARS --></div>
	
  </div>  
   
  <span>
  <button type="submit" onclick="return handle_submit();">Submit</button>
  <button type="reset" onclick="handle_reset();">Reset</button>
  </span>

</form>

<script>
	var $message = $id("message");
	var $shortMessage = $id("shortMessage");
	var $name = $id("name");
	var $address = $id("address");
	var $charCount = $id("charCount");
	var $isEmail = <!-- TYPE-IS-EMAIL -->
	

	function $id(id) { 	// getElementById
		return document.getElementById(id);
	}
	
	function countWords(string) {
		return string.trim().split(/\s+/).length;
	}
	
	function isValidEmail() {
		var email = $address.value.trim().toLowerCase();
		return  /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email);		   		   
	}
	
	function isValidEmail2() {
		var email = $address.value.trim();
		return String(email)
		  .toLowerCase()
		  .match(
		    /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|.(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
		  );
	}
	
	function isValidPhone() {
		var phone = $address.value.trim();
		var target = phone.replace(/[^\d]/g,''); // remove all non-digits
		if(target && target.length===10 &&target.match(/^[2-9]\d{2}/) ) {
			return true;
		}
		return false;
	}

	function handle_submit() {
		var charCount = getCharCount();
		var countLimit =  <!-- TYPE-MAX-CHARS -->;
		if (charCount > countLimit) {
			alert("Message size(" + charCount + ") bigger than limit(" + countLimit + ")! Shrink message!");
		    return false;
		}		
		
		if ($isEmail) {
			if (!isValidEmail() && !isValidEmail2()) {
				alert("Adress does not appear to be a valid Email address!");
				return false;
			}		
		} else {
			if (!isValidPhone()) {
				alert("Address does not appear to be a valid 10 digit cell phone number");
				return false;	
			}
		}		

		var count = countWords(address);
		if (count != 1) {
			alert("Address invalid: it should only contain 1 <!-- TYPE-NAME -->");
			return false;
		}

		return true;
	}
	
	function handle_reset() {
		$charCount.innerHTML="0/<!-- TYPE-MAX-CHARS-->";
		return 0;
	}

	function handle_select() {
		var value = $shortMessage.value;
		var text = $shortMessage.options[$shortMessage.selectedIndex].text;		
		$shortMessage.selectedIndex = 0;

		var msgText = $message.value;
		var pad = msgText.length == 0 ? "" : " ";
		$message.value = msgText + pad + text;
		
		updateCharCount();
	}
	
	function handle_name() {
		updateCharCount();
	}
	
	function handle_address() {
		updateCharCount();
	}
	
	function handle_message() {
		updateCharCount();
	}
	
	function getCharCount() {		
		return $message.value.trim().length;;	
	}
	
	function updateCharCount() {
		var totalLength = getCharCount();
		var countLimit = <!-- TYPE-MAX-CHARS -->;
		
		$charCount.innerHTML = totalLength + "/" + countLimit;
		$charCount.style.color = (totalLength > countLimit) ? "red" : "black";
	}
	
</script>

</body>
</html>
